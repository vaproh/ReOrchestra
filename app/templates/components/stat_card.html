{# stat_card.html — include after setting: title, value, subtitle, color, icon_path #}
<div class="rounded-xl p-5 card-hover
            bg-white dark:bg-white/[0.04]
            border border-gray-200 dark:border-white/[0.06]
            shadow-sm dark:shadow-none">
  <div class="flex items-start justify-between">
    <div>
      <p class="text-xs font-medium text-gray-500 dark:text-gray-500 uppercase tracking-wider">{{ title }}</p>
      <p class="text-2xl font-bold text-gray-900 dark:text-white mt-1.5">{{ value }}</p>
      {% if subtitle %}
      <p class="text-xs text-gray-400 dark:text-gray-600 mt-1">{{ subtitle }}</p>
      {% endif %}
    </div>
    <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0
                {% if color == 'blue' %}bg-blue-100 dark:bg-blue-500/10
                {% elif color == 'green' %}bg-green-100 dark:bg-green-500/10
                {% elif color == 'yellow' %}bg-yellow-100 dark:bg-yellow-500/10
                {% elif color == 'red' %}bg-red-100 dark:bg-red-500/10
                {% elif color == 'purple' %}bg-purple-100 dark:bg-purple-500/10
                {% else %}bg-gray-100 dark:bg-gray-500/10{% endif %}">
      <svg class="w-5 h-5
                  {% if color == 'blue' %}text-blue-600 dark:text-blue-400
                  {% elif color == 'green' %}text-green-600 dark:text-green-400
                  {% elif color == 'yellow' %}text-yellow-600 dark:text-yellow-400
                  {% elif color == 'red' %}text-red-600 dark:text-red-400
                  {% elif color == 'purple' %}text-purple-600 dark:text-purple-400
                  {% else %}text-gray-600 dark:text-gray-400{% endif %}"
           fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="{{ icon_path }}" />
      </svg>
    </div>
  </div>
</div>
