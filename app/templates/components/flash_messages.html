{% if messages %}
  {% for msg in messages %}
    {% if msg.type == 'success' %}
      <div class="flex items-center gap-3 p-4 mb-3 bg-green-50 border border-green-200 text-green-800 rounded-xl text-sm">
        <svg class="w-5 h-5 flex-shrink-0 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        {{ msg.text }}
      </div>
    {% elif msg.type == 'error' %}
      <div class="flex items-center gap-3 p-4 mb-3 bg-red-50 border border-red-200 text-red-800 rounded-xl text-sm">
        <svg class="w-5 h-5 flex-shrink-0 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        {{ msg.text }}
      </div>
    {% elif msg.type == 'warning' %}
      <div class="flex items-center gap-3 p-4 mb-3 bg-yellow-50 border border-yellow-200 text-yellow-800 rounded-xl text-sm">
        <svg class="w-5 h-5 flex-shrink-0 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        {{ msg.text }}
      </div>
    {% endif %}
  {% endfor %}
{% endif %}
