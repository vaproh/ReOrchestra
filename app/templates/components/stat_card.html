<!-- stat_card.html — Usage: {% include 'components/stat_card.html' %} with vars: title, value, subtitle, color, icon_path -->
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 card-hover">
  <div class="flex items-start justify-between">
    <div>
      <p class="text-sm font-medium text-gray-500">{{ title }}</p>
      <p class="text-3xl font-bold text-gray-900 mt-1">{{ value }}</p>
      {% if subtitle %}
      <p class="text-xs text-gray-400 mt-1">{{ subtitle }}</p>
      {% endif %}
    </div>
    <div class="w-11 h-11 rounded-xl flex items-center justify-center flex-shrink-0
                {% if color == 'blue' %}bg-blue-100
                {% elif color == 'green' %}bg-green-100
                {% elif color == 'yellow' %}bg-yellow-100
                {% elif color == 'red' %}bg-red-100
                {% elif color == 'purple' %}bg-purple-100
                {% else %}bg-gray-100{% endif %}">
      <svg class="w-6 h-6
                  {% if color == 'blue' %}text-blue-600
                  {% elif color == 'green' %}text-green-600
                  {% elif color == 'yellow' %}text-yellow-600
                  {% elif color == 'red' %}text-red-600
                  {% elif color == 'purple' %}text-purple-600
                  {% else %}text-gray-600{% endif %}"
           fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="{{ icon_path }}" />
      </svg>
    </div>
  </div>
  {% if trend is defined %}
  <div class="mt-3 flex items-center gap-1 text-xs">
    {% if trend >= 0 %}
      <svg class="w-3 h-3 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 17l9.2-9.2M17 17V7H7"/>
      </svg>
      <span class="text-green-600 font-medium">{{ trend }}%</span>
    {% else %}
      <svg class="w-3 h-3 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 7l-9.2 9.2M7 7v10h10"/>
      </svg>
      <span class="text-red-600 font-medium">{{ trend }}%</span>
    {% endif %}
    <span class="text-gray-400">{{ trend_label | default('') }}</span>
  </div>
  {% endif %}
</div>
